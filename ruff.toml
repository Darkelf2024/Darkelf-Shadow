# Ruff configuration for Darkelf Shadow CI lint gate.
target-version = "py312"
line-length = 120

[lint]
select = ["E", "F", "W"]
# E402: app.py must set Chromium flags before importing Qt (intentional).
# E501: long JS-injection / filter lines are kept verbatim from upstream.
ignore = ["E402", "E501"]

[lint.per-file-ignores]
# miniai.py is vendored heuristic code; allow ambiguous names (E741) and a few
# legacy unused locals (F841) without forcing a refactor of the sentinel logic.
"app/backend/miniai.py" = ["E741", "F841"]
